<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#030712" />
  <title>Denarixx — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #030712;
      color: #f9fafb;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 4rem; margin-bottom: 1.25rem; }
    h1 { color: #facc15; font-size: 2rem; font-weight: 900; margin-bottom: 0.75rem; }
    p { color: #9ca3af; font-size: 1rem; line-height: 1.6; margin-bottom: 1.5rem; max-width: 340px; }
    button {
      background: #facc15;
      color: #0f172a;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      padding: 16px 32px;
      font-size: 1rem;
      cursor: pointer;
      touch-action: manipulation;
      min-height: 52px;
    }
    button:hover, button:focus { background: #fde047; outline: 3px solid #fde047; }
    .status { margin-top: 1.5rem; font-size: 0.8rem; color: #6b7280; }
  </style>
</head>
<body>
  <div>
    <div class="icon" aria-hidden="true">📴</div>
    <h1>You're offline</h1>
    <p>
      Denarixx Vision AI needs a connection to start.
      Simulation mode activates automatically when you reconnect.
    </p>
    <button onclick="window.location.reload()" aria-label="Try to reload and reconnect">
      Try again
    </button>
    <p class="status" id="status">Waiting for connection…</p>
  </div>

  <script>
    // Speak the offline message for screen reader / blind users
    try {
      const utt = new SpeechSynthesisUtterance(
        'You are offline. Denarixx Vision AI is not available. Please check your connection and try again.'
      );
      utt.rate = 0.85;
      window.speechSynthesis.speak(utt);
    } catch (_) {}

    // Auto-reload when back online
    window.addEventListener('online', () => {
      document.getElementById('status').textContent = 'Connection restored — reloading…';
      setTimeout(() => window.location.reload(), 800);
    });
  </script>
</body>
</html>
